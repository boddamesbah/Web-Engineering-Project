version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: coursemanagement-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - coursemanagement-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coursemanagement-api
    depends_on:
      - sqlserver
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CourseManagementDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
    networks:
      - coursemanagement-network

volumes:
  sqldata:

networks:
  coursemanagement-network:
    driver: bridge
